{% extends 'base1.html' %}
{% block title %}Activation Complete | Video Insights AI{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-24 px-4">
    <div class="max-w-md w-full bg-black/60 backdrop-blur-3xl p-12 rounded-[3rem] border border-emerald-500/20 shadow-[0_0_60px_rgba(16,185,129,0.1)] text-center animate-fade-in">
        
        <div class="w-24 h-24 bg-emerald-500/10 border border-emerald-500/30 rounded-full flex items-center justify-center mx-auto mb-10 relative">
            <div class="absolute inset-0 rounded-full border border-emerald-500 animate-ping opacity-20"></div>
            <i class="fa fa-circle-check text-5xl text-emerald-500"></i>
        </div>

        <h1 class="orbitron text-2xl font-black text-white mb-6 tracking-tighter uppercase italic">
            Node <span class="text-emerald-500">Activated</span>
        </h1>

        <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] leading-relaxed mb-12 px-2">
            Verification Successful. Your neural access node is now operational. You may now proceed to the authentication terminal.
        </p>

        <a href="{% url 'login' %}"
           class="glow-button bg-white text-black px-12 py-5 rounded-2xl font-black uppercase tracking-[0.3em] text-[10px] inline-block transition-all active:scale-95 shadow-[0_0_30px_rgba(255,255,255,0.1)] hover:shadow-[0_0_40px_var(--accent-cyan)]">
            <i class="fa fa-right-to-bracket mr-2"></i> Access Terminal
        </a>
    </div>
</div>

<style>
    .animate-fade-in { animation: fadeIn 0.8s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .glow-button:hover { transform: translateY(-2px); }
</style>
{% endblock %}
